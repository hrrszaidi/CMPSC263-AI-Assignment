<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Grab & Throw Dice | Static 2D Canvas</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(145deg, #0a2f44 0%, #1c6e8f 100%);
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup Scene with transparent background (CSS gradient shows) ---
        const scene = new THREE.Scene();
        scene.background = null; // 2D static background via CSS
        scene.fog = new THREE.FogExp2(0x1c6e8f, 0.008);

        // --- Camera: fixed perspective (static canvas) ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3.2, 5.8);
        camera.lookAt(0, 1, 0);
        // No OrbitControls – view is static

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Lighting (vibrant) ---
        const ambientLight = new THREE.AmbientLight(0x4a6175, 0.65);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.3);
        mainLight.position.set(4, 7, 3);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 10;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x88aaff, 0.55);
        fillLight.position.set(1.5, 2.2, 2);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0xffaa77, 0.6);
        rimLight.position.set(-1.8, 2.5, -2.2);
        scene.add(rimLight);

        const backLight = new THREE.PointLight(0x77aaff, 0.45);
        backLight.position.set(0, 1.8, -3);
        scene.add(backLight);

        // --- Ground (white plane, receives shadows, purely visual) ---
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(12, 12),
            new THREE.MeshStandardMaterial({ color: 0xf0f4ff, roughness: 0.7, metalness: 0.05 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.2;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);

        const gridHelper = new THREE.GridHelper(12, 24, 0xffffff, 0xaaccff);
        gridHelper.position.y = -0.15;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);

        // --- Dice Creation (detailed textures) ---
        function createDiceFaceTexture(number) {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#fffaf2');
            grad.addColorStop(1, '#f5ede0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);

            ctx.strokeStyle = '#b59e7a';
            ctx.lineWidth = size * 0.025;
            ctx.strokeRect(size * 0.05, size * 0.05, size * 0.9, size * 0.9);

            ctx.fillStyle = '#1f1a2e';
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = size * 0.02;
            const dotRadius = size * 0.09;
            const offset = size * 0.26;
            const center = size / 2;

            function drawDot(x, y) {
                ctx.beginPath();
                ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#3a334d';
                ctx.beginPath();
                ctx.arc(x - dotRadius*0.2, y - dotRadius*0.2, dotRadius*0.27, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1f1a2e';
            }

            ctx.shadowBlur = size * 0.015;
            switch(number) {
                case 1: drawDot(center, center); break;
                case 2: drawDot(offset, offset); drawDot(size - offset, size - offset); break;
                case 3: drawDot(offset, offset); drawDot(center, center); drawDot(size - offset, size - offset); break;
                case 4: drawDot(offset, offset); drawDot(size - offset, offset); drawDot(offset, size - offset); drawDot(size - offset, size - offset); break;
                case 5: drawDot(offset, offset); drawDot(size - offset, offset); drawDot(offset, size - offset); drawDot(size - offset, size - offset); drawDot(center, center); break;
                case 6:
                    const colX1 = size * 0.26;
                    const colX2 = size * 0.74;
                    const rowStep = size * 0.24;
                    const startY = size * 0.22;
                    for (let i = 0; i < 3; i++) {
                        drawDot(colX1, startY + i * rowStep);
                        drawDot(colX2, startY + i * rowStep);
                    }
                    break;
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = 16;
            texture.needsUpdate = true;
            return texture;
        }

        const faceNumbers = [2, 5, 3, 4, 1, 6];
        const materials = faceNumbers.map(num => new THREE.MeshStandardMaterial({
            map: createDiceFaceTexture(num),
            roughness: 0.25,
            metalness: 0.12,
        }));

        const diceGeometry = new THREE.BoxGeometry(0.9, 0.9, 0.9);
        const dice = new THREE.Mesh(diceGeometry, materials);
        dice.castShadow = true;
        dice.receiveShadow = true;
        scene.add(dice);

        // --- Physics state (bouncing off screen edges) ---
        const diceHalf = 0.45;
        let posX = 0, posY = 1.2, posZ = 0;
        let velX = 1.2, velY = 2.0, velZ = 1.8;
        const GRAVITY = 12.0;
        const GROUND_BOUNCE = 0.95;
        const WALL_BOUNCE = 0.98;

        let rotSpeedX = 1.2, rotSpeedY = 1.5, rotSpeedZ = 1.0;

        dice.position.set(posX, posY, posZ);

        // --- Interaction: Mouse drag to hold and throw the dice ---
        let isDragging = false;
        let dragOffset = new THREE.Vector3();
        let lastMousePos = new THREE.Vector2();
        let dragVelocity = new THREE.Vector3(0, 0, 0);
        let lastDragTime = 0;
        
        const raycaster = new THREE.Raycaster();
        const mouseCoords = new THREE.Vector2();

        // Helper: get intersection with a plane at given Y level (for dragging)
        function getIntersectWithPlane(planeY, mouseX, mouseY) {
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), planeY);
            mouseCoords.set(mouseX, mouseY);
            raycaster.setFromCamera(mouseCoords, camera);
            const intersectionPoint = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, intersectionPoint)) {
                return intersectionPoint;
            }
            return null;
        }

        function onMouseDown(event) {
            // Check if click hits the dice
            mouseCoords.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouseCoords.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouseCoords, camera);
            const intersects = raycaster.intersectObject(dice);
            if (intersects.length > 0) {
                isDragging = true;
                lastDragTime = performance.now();
                lastMousePos.set(event.clientX, event.clientY);
                dragVelocity.set(0, 0, 0);
                
                // Compute drag offset relative to the plane at dice's current Y
                const intersectPoint = getIntersectWithPlane(dice.position.y, mouseCoords.x, mouseCoords.y);
                if (intersectPoint) {
                    dragOffset.copy(dice.position).sub(intersectPoint);
                } else {
                    dragOffset.set(0, 0, 0);
                }
                // Stop physics velocities while dragging
                velX = 0; velY = 0; velZ = 0;
            }
        }

        function onMouseMove(event) {
            if (!isDragging) return;
            
            const now = performance.now();
            const dt = Math.min(0.033, (now - lastDragTime) / 1000);
            if (dt > 0) {
                // Compute screen delta for throw velocity
                const dx = event.clientX - lastMousePos.x;
                const dy = event.clientY - lastMousePos.y;
                const speedFactor = 0.012;
                dragVelocity.set(dx * speedFactor, -dy * speedFactor, 0);
                
                // Move dice in world space along a plane parallel to camera view
                // Get intersection with plane at current dice Y
                const currentY = dice.position.y;
                const intersectPoint = getIntersectWithPlane(currentY, mouseCoords.x, mouseCoords.y);
                if (intersectPoint) {
                    let newPos = intersectPoint.clone().add(dragOffset);
                    // Clamp Y to reasonable range
                    newPos.y = Math.min(2.8, Math.max(0.5, newPos.y));
                    dice.position.copy(newPos);
                    posX = dice.position.x;
                    posY = dice.position.y;
                    posZ = dice.position.z;
                }
                lastMousePos.set(event.clientX, event.clientY);
            }
            lastDragTime = now;
        }

        function onMouseUp(event) {
            if (!isDragging) return;
            isDragging = false;
            
            // Apply throw velocity (map screen delta to world directions)
            // Use camera orientation to convert screen space velocity to 3D
            const cameraDirection = camera.getWorldDirection(new THREE.Vector3());
            const cameraRight = new THREE.Vector3();
            const cameraUp = new THREE.Vector3();
            camera.matrixWorld.extractBasis(cameraRight, cameraUp, cameraDirection);
            
            const throwVelX = dragVelocity.x * cameraRight.x;
            const throwVelZ = dragVelocity.x * cameraRight.z;
            const throwVelY = -dragVelocity.y * 0.8;
            
            velX = Math.min(5, Math.max(-5, throwVelX + (Math.random() - 0.5) * 0.5));
            velZ = Math.min(5, Math.max(-5, throwVelZ + (Math.random() - 0.5) * 0.5));
            velY = Math.min(4.5, Math.max(-3, throwVelY + 1.2));
            
            dragVelocity.set(0, 0, 0);
        }

        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);

        // --- Snow particle system (ambiance) ---
        const SNOW_COUNT = 2000;
        const snowGeo = new THREE.BufferGeometry();
        const snowPositions = new Float32Array(SNOW_COUNT * 3);
        const snowVelocities = [];
        for (let i = 0; i < SNOW_COUNT; i++) {
            snowPositions[i*3] = (Math.random() - 0.5) * 15;
            snowPositions[i*3+1] = Math.random() * 8;
            snowPositions[i*3+2] = (Math.random() - 0.5) * 12;
            snowVelocities.push({
                y: 0.6 + Math.random() * 1.7,
                x: (Math.random() - 0.5) * 0.5,
                z: (Math.random() - 0.5) * 0.5
            });
        }
        snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
        const snowMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending });
        const snow = new THREE.Points(snowGeo, snowMat);
        scene.add(snow);
        
        const bigSnowCount = 600;
        const bigSnowGeo = new THREE.BufferGeometry();
        const bigSnowPositions = new Float32Array(bigSnowCount * 3);
        const bigSnowVel = [];
        for (let i = 0; i < bigSnowCount; i++) {
            bigSnowPositions[i*3] = (Math.random() - 0.5) * 14;
            bigSnowPositions[i*3+1] = Math.random() * 7.5;
            bigSnowPositions[i*3+2] = (Math.random() - 0.5) * 13;
            bigSnowVel.push({ y: 0.4 + Math.random() * 1.2, x: (Math.random() - 0.5) * 0.4, z: (Math.random() - 0.5) * 0.4 });
        }
        bigSnowGeo.setAttribute('position', new THREE.BufferAttribute(bigSnowPositions, 3));
        const bigSnowMat = new THREE.PointsMaterial({ color: 0xeef5ff, size: 0.11, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const bigSnow = new THREE.Points(bigSnowGeo, bigSnowMat);
        scene.add(bigSnow);

        // --- Wall collision: screen edges (2D canvas boundaries) ---
        function handleScreenEdgeCollision() {
            const screenPos = dice.position.clone().project(camera);
            // screenPos.x,y in range [-1,1] (left -1, right 1, bottom -1, top 1)
            const distance = camera.position.distanceTo(dice.position);
            const screenRadius = (0.6 / distance) * 0.8;
            const leftBound = -1 + screenRadius;
            const rightBound = 1 - screenRadius;
            const bottomBound = -1 + screenRadius;
            const topBound = 1 - screenRadius;
            
            let bounced = false;
            if (screenPos.x < leftBound) {
                velX = -velX * WALL_BOUNCE;
                const targetScreenX = leftBound;
                const rayDir = new THREE.Vector3(targetScreenX, screenPos.y, 1).unproject(camera).sub(camera.position).normalize();
                const t = (dice.position.y - camera.position.y) / rayDir.y;
                const newWorldX = camera.position.x + rayDir.x * t;
                posX = newWorldX;
                dice.position.x = posX;
                bounced = true;
            } else if (screenPos.x > rightBound) {
                velX = -velX * WALL_BOUNCE;
                const targetScreenX = rightBound;
                const rayDir = new THREE.Vector3(targetScreenX, screenPos.y, 1).unproject(camera).sub(camera.position).normalize();
                const t = (dice.position.y - camera.position.y) / rayDir.y;
                const newWorldX = camera.position.x + rayDir.x * t;
                posX = newWorldX;
                dice.position.x = posX;
                bounced = true;
            }
            
            if (screenPos.y < bottomBound) {
                velY = -velY * WALL_BOUNCE;
                const targetScreenY = bottomBound;
                const rayDir = new THREE.Vector3(screenPos.x, targetScreenY, 1).unproject(camera).sub(camera.position).normalize();
                const t = (dice.position.z - camera.position.z) / rayDir.z;
                const newWorldY = camera.position.y + rayDir.y * t;
                posY = Math.max(0.4, newWorldY);
                dice.position.y = posY;
                bounced = true;
            } else if (screenPos.y > topBound) {
                velY = -velY * WALL_BOUNCE;
                const targetScreenY = topBound;
                const rayDir = new THREE.Vector3(screenPos.x, targetScreenY, 1).unproject(camera).sub(camera.position).normalize();
                const t = (dice.position.z - camera.position.z) / rayDir.z;
                const newWorldY = camera.position.y + rayDir.y * t;
                posY = Math.min(3.5, newWorldY);
                dice.position.y = posY;
                bounced = true;
            }
            
            if (bounced) {
                rotSpeedX += (Math.random() - 0.5) * 1.2;
                rotSpeedY += (Math.random() - 0.5) * 1.2;
                rotSpeedZ += (Math.random() - 0.5) * 1.2;
            }
        }

        function handleGroundCollision() {
            const groundY = 0.0;
            if (posY - diceHalf <= groundY) {
                posY = groundY + diceHalf;
                velY = -velY * GROUND_BOUNCE;
                if (Math.abs(velY) < 0.5 && posY <= groundY + diceHalf + 0.05) {
                    velY = -1.0;
                }
                rotSpeedX += (Math.random() - 0.5) * 1.0;
                rotSpeedY += (Math.random() - 0.5) * 1.0;
                rotSpeedZ += (Math.random() - 0.5) * 1.0;
            }
        }

        function handleWorldBoundaries() {
            if (posY > 4.0) {
                posY = 4.0;
                velY = -velY * 0.9;
            }
            if (posY < 0.3) {
                posY = 0.3;
                velY = -velY * 0.9;
            }
            if (Math.abs(posX) > 4.5) {
                velX = -velX * 0.95;
                posX = Math.sign(posX) * 4.5;
            }
            if (Math.abs(posZ) > 5) {
                velZ = -velZ * 0.95;
                posZ = Math.sign(posZ) * 5;
            }
        }

        // --- Animation loop ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            if (delta <= 0) delta = 0.016;
            lastTime = now;
            
            if (!isDragging) {
                velY -= GRAVITY * delta;
                posX += velX * delta;
                posY += velY * delta;
                posZ += velZ * delta;
                
                handleGroundCollision();
                handleWorldBoundaries();
                handleScreenEdgeCollision();
                
                velX *= 0.998;
                velZ *= 0.998;
                
                dice.position.set(posX, posY, posZ);
                
                rotSpeedX *= (1 - delta * 0.2);
                rotSpeedY *= (1 - delta * 0.2);
                rotSpeedZ *= (1 - delta * 0.2);
                dice.rotation.x += rotSpeedX * delta;
                dice.rotation.y += rotSpeedY * delta;
                dice.rotation.z += rotSpeedZ * delta;
            } else {
                posX = dice.position.x;
                posY = dice.position.y;
                posZ = dice.position.z;
                velX = 0; velY = 0; velZ = 0;
            }
            
            // Snow update
            const snowPosAttr = snow.geometry.attributes.position;
            const snowArray = snowPosAttr.array;
            for (let i = 0; i < SNOW_COUNT; i++) {
                let y = snowArray[i*3+1] - snowVelocities[i].y * delta;
                let x = snowArray[i*3] + snowVelocities[i].x * delta;
                let z = snowArray[i*3+2] + snowVelocities[i].z * delta;
                if (y < -0.5 || y > 7 || Math.abs(x) > 8 || Math.abs(z) > 7) {
                    y = 5 + Math.random() * 3;
                    x = (Math.random() - 0.5) * 12;
                    z = (Math.random() - 0.5) * 11;
                    snowVelocities[i].y = 0.6 + Math.random() * 1.6;
                    snowVelocities[i].x = (Math.random() - 0.5) * 0.6;
                    snowVelocities[i].z = (Math.random() - 0.5) * 0.6;
                }
                snowArray[i*3] = x;
                snowArray[i*3+1] = y;
                snowArray[i*3+2] = z;
            }
            snowPosAttr.needsUpdate = true;
            
            const bigPosAttr = bigSnow.geometry.attributes.position;
            const bigArray = bigPosAttr.array;
            for (let i = 0; i < bigSnowCount; i++) {
                let y = bigArray[i*3+1] - bigSnowVel[i].y * delta;
                let x = bigArray[i*3] + bigSnowVel[i].x * delta;
                let z = bigArray[i*3+2] + bigSnowVel[i].z * delta;
                if (y < -0.3 || y > 6.8 || Math.abs(x) > 8.5 || Math.abs(z) > 8) {
                    y = 4.5 + Math.random() * 3;
                    x = (Math.random() - 0.5) * 13;
                    z = (Math.random() - 0.5) * 12;
                    bigSnowVel[i].y = 0.4 + Math.random() * 1.3;
                    bigSnowVel[i].x = (Math.random() - 0.5) * 0.5;
                    bigSnowVel[i].z = (Math.random() - 0.5) * 0.5;
                }
                bigArray[i*3] = x;
                bigArray[i*3+1] = y;
                bigArray[i*3+2] = z;
            }
            bigPosAttr.needsUpdate = true;
            
            snow.rotation.y += 0.001;
            bigSnow.rotation.y -= 0.0008;
            
            // Dynamic lighting
            const time = Date.now() * 0.003;
            fillLight.intensity = 0.55 + Math.sin(time) * 0.1;
            rimLight.intensity = 0.6 + Math.cos(time * 0.8) * 0.12;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Small glow under dice
        const groundGlow = new THREE.PointLight(0x88bbff, 0.4);
        groundGlow.position.set(0, 0.2, 0);
        scene.add(groundGlow);
        function glowPulse() {
            groundGlow.intensity = 0.35 + Math.sin(Date.now() * 0.007) * 0.12;
            requestAnimationFrame(glowPulse);
        }
        glowPulse();
        
        console.log('Static canvas ready. Click and drag the dice to hold and throw! Walls = window edges.');
    </script>
</body>
</html>
