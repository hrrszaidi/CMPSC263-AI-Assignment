<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Draggable 2D Dice | Stop & Random Face</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #add8e6; /* Flat light blue */
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .stop-button {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Segoe UI', system-ui, monospace;
            color: #1e6f9f;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }
        .stop-button:hover {
            background: white;
            transform: translateX(-50%) scale(1.02);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        .stop-button:active {
            transform: translateX(-50%) scale(0.98);
        }
    </style>
</head>
<body>
    <button class="stop-button" id="stopButton">🎲 STOP DICE</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup Scene with flat light blue background ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xadd8e6);

        // --- Orthographic Camera (no perspective, 2D movement) ---
        let camera;
        let cameraLeft = -5, cameraRight = 5, cameraTop = 5, cameraBottom = -5;
        
        function updateCameraAspect() {
            const aspect = window.innerWidth / window.innerHeight;
            // Keep vertical size constant (height = 10 units) so width adjusts
            const height = 10;
            const width = height * aspect;
            cameraLeft = -width / 2;
            cameraRight = width / 2;
            cameraTop = height / 2;
            cameraBottom = -height / 2;
            
            if (camera) {
                camera.left = cameraLeft;
                camera.right = cameraRight;
                camera.top = cameraTop;
                camera.bottom = cameraBottom;
                camera.updateProjectionMatrix();
            }
        }
        
        camera = new THREE.OrthographicCamera(cameraLeft, cameraRight, cameraTop, cameraBottom, 0.1, 100);
        camera.position.set(0, 0, 10);
        camera.lookAt(0, 0, 0);
        updateCameraAspect();

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting (still works in orthographic) ---
        const ambientLight = new THREE.AmbientLight(0x4a6175, 0.7);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.3);
        mainLight.position.set(4, 7, 3);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 10;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x88aaff, 0.55);
        fillLight.position.set(1.5, 2.2, 2);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0xffaa77, 0.6);
        rimLight.position.set(-1.8, 2.5, -2.2);
        scene.add(rimLight);

        const backLight = new THREE.PointLight(0x77aaff, 0.45);
        backLight.position.set(0, 1.8, -3);
        scene.add(backLight);

        // --- Dice Creation (detailed textures) ---
        function createDiceFaceTexture(number) {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#fffaf2');
            grad.addColorStop(1, '#f5ede0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);

            ctx.strokeStyle = '#b59e7a';
            ctx.lineWidth = size * 0.025;
            ctx.strokeRect(size * 0.05, size * 0.05, size * 0.9, size * 0.9);

            ctx.fillStyle = '#1f1a2e';
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = size * 0.02;
            const dotRadius = size * 0.09;
            const offset = size * 0.26;
            const center = size / 2;

            function drawDot(x, y) {
                ctx.beginPath();
                ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#3a334d';
                ctx.beginPath();
                ctx.arc(x - dotRadius*0.2, y - dotRadius*0.2, dotRadius*0.27, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1f1a2e';
            }

            ctx.shadowBlur = size * 0.015;
            switch(number) {
                case 1: drawDot(center, center); break;
                case 2: drawDot(offset, offset); drawDot(size - offset, size - offset); break;
                case 3: drawDot(offset, offset); drawDot(center, center); drawDot(size - offset, size - offset); break;
                case 4: drawDot(offset, offset); drawDot(size - offset, offset); drawDot(offset, size - offset); drawDot(size - offset, size - offset); break;
                case 5: drawDot(offset, offset); drawDot(size - offset, offset); drawDot(offset, size - offset); drawDot(size - offset, size - offset); drawDot(center, center); break;
                case 6:
                    const colX1 = size * 0.26;
                    const colX2 = size * 0.74;
                    const rowStep = size * 0.24;
                    const startY = size * 0.22;
                    for (let i = 0; i < 3; i++) {
                        drawDot(colX1, startY + i * rowStep);
                        drawDot(colX2, startY + i * rowStep);
                    }
                    break;
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = 16;
            texture.needsUpdate = true;
            return texture;
        }

        const faceNumbers = [2, 5, 3, 4, 1, 6];
        const materials = faceNumbers.map(num => new THREE.MeshStandardMaterial({
            map: createDiceFaceTexture(num),
            roughness: 0.25,
            metalness: 0.12,
        }));

        const diceGeometry = new THREE.BoxGeometry(0.9, 0.9, 0.9);
        const dice = new THREE.Mesh(diceGeometry, materials);
        dice.castShadow = true;
        dice.receiveShadow = true;
        scene.add(dice);

        // --- Physics state: only X and Y movement, fixed Z = 0 ---
        const diceHalf = 0.45;
        let posX = 0, posY = 0;    // position in world units (X, Y)
        let velX = 0, velY = 0;
        const GRAVITY = 12.0;
        const WALL_BOUNCE = 0.95;
        
        // World boundaries: derived from camera frustum (with padding for dice size)
        let worldLeft, worldRight, worldBottom, worldTop;
        
        function updateWorldBounds() {
            // Get camera frustum edges (orthographic)
            worldLeft = camera.left + diceHalf;
            worldRight = camera.right - diceHalf;
            worldBottom = camera.bottom + diceHalf;
            worldTop = camera.top - diceHalf;
        }
        
        updateWorldBounds();

        let rotSpeedX = 0.5, rotSpeedY = 0.7, rotSpeedZ = 0.4;
        
        dice.position.set(posX, posY, 0);
        
        // --- Dragging: click and drag in 2D plane (X, Y) ---
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0; // offset from dice center to mouse world pos
        
        const raycaster = new THREE.Raycaster();
        const mouseCoords = new THREE.Vector2();
        
        function getWorldPositionFromMouse(clientX, clientY) {
            // Convert screen coordinates to world coordinates at Z=0
            const rect = renderer.domElement.getBoundingClientRect();
            const ndcX = (clientX - rect.left) / rect.width * 2 - 1;
            const ndcY = -(clientY - rect.top) / rect.height * 2 + 1;
            
            // For orthographic camera, world coordinates are linear with NDC
            const worldX = (ndcX * (camera.right - camera.left) / 2) + (camera.right + camera.left) / 2;
            const worldY = (ndcY * (camera.top - camera.bottom) / 2) + (camera.top + camera.bottom) / 2;
            return { x: worldX, y: worldY };
        }
        
        function onMouseDown(event) {
            // Check if click hits the dice
            const { x, y } = getWorldPositionFromMouse(event.clientX, event.clientY);
            // Simple bounding box check (since orthographic)
            if (Math.abs(x - posX) <= diceHalf && Math.abs(y - posY) <= diceHalf) {
                isDragging = true;
                dragOffsetX = posX - x;
                dragOffsetY = posY - y;
                velX = 0;
                velY = 0;
            }
        }
        
        function onMouseMove(event) {
            if (!isDragging) return;
            const { x, y } = getWorldPositionFromMouse(event.clientX, event.clientY);
            let newX = x + dragOffsetX;
            let newY = y + dragOffsetY;
            // Clamp to world boundaries
            newX = Math.min(worldRight, Math.max(worldLeft, newX));
            newY = Math.min(worldTop, Math.max(worldBottom, newY));
            dice.position.set(newX, newY, 0);
            posX = newX;
            posY = newY;
        }
        
        function onMouseUp(event) {
            if (!isDragging) return;
            isDragging = false;
            // Optionally add a small random spin on release
            rotSpeedX += (Math.random() - 0.5) * 0.8;
            rotSpeedY += (Math.random() - 0.5) * 0.8;
            rotSpeedZ += (Math.random() - 0.5) * 0.8;
        }
        
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        
        // --- Snow particle system (ambiance) ---
        const SNOW_COUNT = 1800;
        const snowGeo = new THREE.BufferGeometry();
        const snowPositions = new Float32Array(SNOW_COUNT * 3);
        const snowVelocities = [];
        for (let i = 0; i < SNOW_COUNT; i++) {
            snowPositions[i*3] = (Math.random() - 0.5) * (cameraRight - cameraLeft) * 1.2;
            snowPositions[i*3+1] = Math.random() * (cameraTop - cameraBottom) + cameraBottom;
            snowPositions[i*3+2] = (Math.random() - 0.5) * 5;
            snowVelocities.push({
                y: 0.6 + Math.random() * 1.7,
                x: (Math.random() - 0.5) * 0.5,
                z: 0
            });
        }
        snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
        const snowMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending });
        const snow = new THREE.Points(snowGeo, snowMat);
        scene.add(snow);
        
        const bigSnowCount = 500;
        const bigSnowGeo = new THREE.BufferGeometry();
        const bigSnowPositions = new Float32Array(bigSnowCount * 3);
        const bigSnowVel = [];
        for (let i = 0; i < bigSnowCount; i++) {
            bigSnowPositions[i*3] = (Math.random() - 0.5) * (cameraRight - cameraLeft) * 1.2;
            bigSnowPositions[i*3+1] = Math.random() * (cameraTop - cameraBottom) + cameraBottom;
            bigSnowPositions[i*3+2] = (Math.random() - 0.5) * 4;
            bigSnowVel.push({ y: 0.4 + Math.random() * 1.2, x: (Math.random() - 0.5) * 0.4, z: 0 });
        }
        bigSnowGeo.setAttribute('position', new THREE.BufferAttribute(bigSnowPositions, 3));
        const bigSnowMat = new THREE.PointsMaterial({ color: 0xeef5ff, size: 0.12, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const bigSnow = new THREE.Points(bigSnowGeo, bigSnowMat);
        scene.add(bigSnow);
        
        // --- Wall collision (screen edges) ---
        function handleWallCollision() {
            // X boundaries
            if (posX + diceHalf >= worldRight) {
                posX = worldRight - diceHalf;
                velX = -velX * WALL_BOUNCE;
                rotSpeedX += (Math.random() - 0.5) * 1.0;
                rotSpeedY += (Math.random() - 0.5) * 1.0;
                rotSpeedZ += (Math.random() - 0.5) * 1.0;
            } else if (posX - diceHalf <= worldLeft) {
                posX = worldLeft + diceHalf;
                velX = -velX * WALL_BOUNCE;
                rotSpeedX += (Math.random() - 0.5) * 1.0;
                rotSpeedY += (Math.random() - 0.5) * 1.0;
                rotSpeedZ += (Math.random() - 0.5) * 1.0;
            }
            
            // Y boundaries (top and bottom)
            if (posY + diceHalf >= worldTop) {
                posY = worldTop - diceHalf;
                velY = -velY * WALL_BOUNCE;
                rotSpeedX += (Math.random() - 0.5) * 1.0;
                rotSpeedY += (Math.random() - 0.5) * 1.0;
                rotSpeedZ += (Math.random() - 0.5) * 1.0;
            } else if (posY - diceHalf <= worldBottom) {
                posY = worldBottom + diceHalf;
                velY = -velY * WALL_BOUNCE;
                rotSpeedX += (Math.random() - 0.5) * 1.0;
                rotSpeedY += (Math.random() - 0.5) * 1.0;
                rotSpeedZ += (Math.random() - 0.5) * 1.0;
            }
        }
        
        // --- Stop Button: center dice, stop motion, show random face ---
        const stopButton = document.getElementById('stopButton');
        
        function rotateDiceToShowRandomSide() {
            // Face normals in object local space (aligned with cube axes)
            const faceNormals = [
                new THREE.Vector3(1, 0, 0),  // right
                new THREE.Vector3(-1, 0, 0), // left
                new THREE.Vector3(0, 1, 0),  // up
                new THREE.Vector3(0, -1, 0), // down
                new THREE.Vector3(0, 0, 1),  // front
                new THREE.Vector3(0, 0, -1)  // back
            ];
            const randomIndex = Math.floor(Math.random() * 6);
            const targetNormal = faceNormals[randomIndex];
            
            // Camera looks along -Z (since orthographic, direction is (0,0,-1))
            const cameraDir = new THREE.Vector3(0, 0, -1);
            const quat = new THREE.Quaternion().setFromUnitVectors(targetNormal, cameraDir);
            dice.quaternion.copy(quat);
            
            rotSpeedX = 0;
            rotSpeedY = 0;
            rotSpeedZ = 0;
        }
        
        function stopDice() {
            if (isDragging) {
                isDragging = false;
            }
            velX = 0;
            velY = 0;
            posX = 0;
            posY = 0;
            dice.position.set(posX, posY, 0);
            rotateDiceToShowRandomSide();
        }
        
        stopButton.addEventListener('click', stopDice);
        
        // --- Animation loop ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            if (delta <= 0) delta = 0.016;
            lastTime = now;
            
            if (!isDragging) {
                // Apply gravity
                velY -= GRAVITY * delta;
                posX += velX * delta;
                posY += velY * delta;
                
                handleWallCollision();
                
                // Air resistance
                velX *= 0.998;
                velY *= 0.998;
                
                dice.position.set(posX, posY, 0);
                
                // Rotation damping
                rotSpeedX *= (1 - delta * 0.25);
                rotSpeedY *= (1 - delta * 0.25);
                rotSpeedZ *= (1 - delta * 0.25);
                dice.rotation.x += rotSpeedX * delta;
                dice.rotation.y += rotSpeedY * delta;
                dice.rotation.z += rotSpeedZ * delta;
            } else {
                // Update physics variables from drag
                posX = dice.position.x;
                posY = dice.position.y;
                velX = 0;
                velY = 0;
            }
            
            // Update world bounds in case window resized
            updateWorldBounds();
            
            // Snow animation
            const snowPosAttr = snow.geometry.attributes.position;
            const snowArray = snowPosAttr.array;
            for (let i = 0; i < SNOW_COUNT; i++) {
                let y = snowArray[i*3+1] - snowVelocities[i].y * delta;
                let x = snowArray[i*3] + snowVelocities[i].x * delta;
                if (y < cameraBottom - 0.5) {
                    y = cameraTop + 0.5;
                    x = (Math.random() - 0.5) * (cameraRight - cameraLeft);
                    snowVelocities[i].y = 0.6 + Math.random() * 1.6;
                    snowVelocities[i].x = (Math.random() - 0.5) * 0.6;
                }
                snowArray[i*3] = x;
                snowArray[i*3+1] = y;
            }
            snowPosAttr.needsUpdate = true;
            
            const bigPosAttr = bigSnow.geometry.attributes.position;
            const bigArray = bigPosAttr.array;
            for (let i = 0; i < bigSnowCount; i++) {
                let y = bigArray[i*3+1] - bigSnowVel[i].y * delta;
                let x = bigArray[i*3] + bigSnowVel[i].x * delta;
                if (y < cameraBottom - 0.5) {
                    y = cameraTop + 0.5;
                    x = (Math.random() - 0.5) * (cameraRight - cameraLeft);
                    bigSnowVel[i].y = 0.4 + Math.random() * 1.3;
                    bigSnowVel[i].x = (Math.random() - 0.5) * 0.5;
                }
                bigArray[i*3] = x;
                bigArray[i*3+1] = y;
            }
            bigPosAttr.needsUpdate = true;
            
            // Dynamic lighting
            const time = Date.now() * 0.003;
            fillLight.intensity = 0.55 + Math.sin(time) * 0.1;
            rimLight.intensity = 0.6 + Math.cos(time * 0.8) * 0.12;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            updateCameraAspect();
            updateWorldBounds();
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Reposition snow to new bounds
            const snowPosAttr = snow.geometry.attributes.position;
            const snowArray = snowPosAttr.array;
            for (let i = 0; i < SNOW_COUNT; i++) {
                if (snowArray[i*3+1] > cameraTop || snowArray[i*3+1] < cameraBottom) {
                    snowArray[i*3+1] = cameraBottom + Math.random() * (cameraTop - cameraBottom);
                    snowArray[i*3] = (Math.random() - 0.5) * (cameraRight - cameraLeft);
                }
            }
            snowPosAttr.needsUpdate = true;
            
            const bigPosAttr = bigSnow.geometry.attributes.position;
            const bigArray = bigPosAttr.array;
            for (let i = 0; i < bigSnowCount; i++) {
                if (bigArray[i*3+1] > cameraTop || bigArray[i*3+1] < cameraBottom) {
                    bigArray[i*3+1] = cameraBottom + Math.random() * (cameraTop - cameraBottom);
                    bigArray[i*3] = (Math.random() - 0.5) * (cameraRight - cameraLeft);
                }
            }
            bigPosAttr.needsUpdate = true;
        }
        
        console.log('Ready: Click and drag the dice (2D movement). Click STOP to center and show random face.');
    </script>
</body>
</html>
